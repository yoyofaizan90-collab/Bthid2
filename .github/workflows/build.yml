name: Build APK

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Unzip project
        run: unzip BTHidController.zip

      # 🔍 DEBUG STEP (IMPORTANT)
      - name: Show project structure
        run: ls -R

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: android-actions/setup-android@v3

      - name: Accept licenses
        run: yes | sdkmanager --licenses

      # ⚠️ TEMPORARY BUILD ATTEMPT (will fail if path wrong)
      - name: Build APK
        run: |
          chmod +x BTHidController/gradlew || true
          ./BTHidController/gradlew assembleDebug || true

      - name: Upload APK (if built)
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: '**/build/outputs/apk/debug/*.apk'
